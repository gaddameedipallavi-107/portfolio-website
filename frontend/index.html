<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pallavi Portfolio</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
            text-align: center;
        }

        header {
            background: black;
            color: white;
            padding: 20px;
        }

        section {
            margin: 25px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }

        button {
            padding: 10px 15px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 5px;
        }

        .project {
            background: white;
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px auto;
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Pallavi Portfolio</h1>
    <p>Welcome to my personal portfolio website</p>
</header>

<!-- ABOUT -->
<section>
    <h2>About Me</h2>
    <p>I am a web development student.</p>
</section>

<!-- SKILLS -->
<section>
    <h2>Skills</h2>
    <p>HTML | CSS | JavaScript</p>
</section>

<!-- ADD PROJECT -->
<section>
    <h2>Add New Project</h2>

    <input type="text" id="title" placeholder="Project Title"><br>
    <input type="text" id="description" placeholder="Description"><br>
    <input type="text" id="tech" placeholder="Tech Used"><br>

    <button onclick="addProject()">Add Project</button>

    <p id="status"></p>
</section>

<hr>

<!-- PROJECTS -->
<section>
    <h2>Projects</h2>
    <div id="project-list"></div>
</section>

<!-- CLICK ME -->
<section>
    <h2>Click Me</h2>
    <button onclick="showMessage()">Click Me</button>
    <p id="msg"></p>
</section>

<script>

const API = "https://portfolio-website-2-w4ik.onrender.com";

// CLICK BUTTON
function showMessage() {
    document.getElementById("msg").innerText =
        "Hello Pallavi 🚀 Welcome to your portfolio!";
}

// ADD PROJECT
function addProject() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const tech = document.getElementById("tech").value;

    fetch(`${API}/projects`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ title, description, tech })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("status").innerText = "Project Added 🎉";
        loadProjects();
    })
    .catch(err => {
        document.getElementById("status").innerText = "Error adding project ❌";
    });
}

// LOAD PROJECTS
function loadProjects() {
    fetch(`${API}/projects`)
    .then(res => res.json())
    .then(data => {
        let html = "";

        data.forEach(p => {
            html += `
            <div class="project">
                <h3>${p.title}</h3>
                <p>${p.description}</p>
                <p>${p.tech}</p>

                <button onclick="deleteProject(${p.id})">Delete</button>
            </div>
            `;
        });

        document.getElementById("project-list").innerHTML = html;
    })
    .catch(err => {
        document.getElementById("project-list").innerHTML =
            "Error fetching projects ❌";
    });
}

// DELETE PROJECT
function deleteProject(id) {
    fetch(`${API}/projects/${id}`, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {
        alert("Project Deleted 🗑️");
        loadProjects();
    })
    .catch(err => {
        alert("Error deleting project ❌");
    });
}

// AUTO LOAD
window.onload = loadProjects;

</script>

</body>
</html>
